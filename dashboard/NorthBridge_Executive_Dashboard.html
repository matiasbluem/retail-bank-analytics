<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NorthBridge Bank — Executive Analytics Dashboard</title>
<style>
  :root {
    --navy: #1B3A6B;
    --navy-deep: #122548;
    --blue: #2563EB;
    --teal: #0F766E;
    --red: #DC2626;
    --amber: #D97706;
    --green: #16A34A;
    --slate-50: #F8FAFC;
    --slate-100: #F1F5F9;
    --slate-200: #E2E8F0;
    --slate-400: #94A3B8;
    --slate-600: #475569;
    --slate-800: #1E293B;
    --card-radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--slate-50);
    color: var(--slate-800);
  }
  .app { max-width: 1320px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── Header ───────────────────────────────────────────── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 3px solid var(--navy);
    padding-bottom: 14px;
    margin-bottom: 22px;
  }
  .header-left .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate-400);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header-left h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 800;
    color: var(--navy-deep);
    letter-spacing: -0.01em;
  }
  .header-left .sub {
    font-size: 13px;
    color: var(--slate-600);
    margin-top: 3px;
  }
  .header-right {
    text-align: right;
    font-size: 11px;
    color: var(--slate-400);
  }
  .badge-conf {
    display: inline-block;
    margin-top: 4px;
    background: var(--red);
    color: white;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* ── Tabs ─────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--slate-200);
  }
  .tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate-600);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    user-select: none;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--navy); }
  .tab.active { color: var(--navy); border-bottom-color: var(--blue); }

  /* ── KPI Cards ────────────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .kpi-card {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: var(--card-radius);
    padding: 14px 16px;
  }
  .kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--slate-400);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--navy-deep);
    line-height: 1;
  }
  .kpi-sub { font-size: 11px; color: var(--slate-600); margin-top: 5px; }
  .kpi-value.red { color: var(--red); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.amber { color: var(--amber); }

  /* ── Panels ───────────────────────────────────────────── */
  .panel-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .panel {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: var(--card-radius);
    padding: 18px 20px;
  }
  .panel h3 {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 800;
    color: var(--navy-deep);
  }
  .panel .panel-sub {
    font-size: 11.5px;
    color: var(--slate-600);
    margin-bottom: 14px;
  }
  .panel.full { grid-column: 1 / -1; }

  /* ── Bar chart rows ───────────────────────────────────── */
  .bar-row {
    display: grid;
    grid-template-columns: 150px 1fr 60px;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
    font-size: 12.5px;
  }
  .bar-row .name { color: var(--slate-800); font-weight: 600; }
  .bar-track {
    background: var(--slate-100);
    border-radius: 5px;
    height: 16px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s ease;
  }
  .bar-row .val { text-align: right; font-weight: 700; color: var(--slate-800); font-variant-numeric: tabular-nums; }

  /* ── Tables ───────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: white;
    background: var(--navy);
    padding: 8px 10px;
    font-weight: 700;
  }
  th.num, td.num { text-align: right; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--slate-100); color: var(--slate-800); }
  tr:nth-child(even) td { background: var(--slate-50); }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
  }
  .pill.red { background: #FEE2E2; color: var(--red); }
  .pill.amber { background: #FEF3C7; color: var(--amber); }
  .pill.green { background: #DCFCE7; color: var(--green); }
  .pill.slate { background: var(--slate-200); color: var(--slate-600); }

  /* ── Risk tier cards ──────────────────────────────────── */
  .risk-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .risk-card {
    border-radius: 8px;
    padding: 12px 14px;
    color: white;
  }
  .risk-card .rk-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.9; }
  .risk-card .rk-count { font-size: 22px; font-weight: 800; margin: 4px 0 2px; }
  .risk-card .rk-sub { font-size: 10.5px; opacity: 0.9; }

  /* ── Insight box ──────────────────────────────────────── */
  .insight {
    background: var(--slate-50);
    border-left: 3px solid var(--blue);
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--slate-600);
    border-radius: 0 6px 6px 0;
    margin-top: 10px;
    line-height: 1.5;
  }
  .insight b { color: var(--navy-deep); }

  /* ── Footer ───────────────────────────────────────────── */
  .footer {
    text-align: center;
    font-size: 10.5px;
    color: var(--slate-400);
    margin-top: 30px;
    padding-top: 14px;
    border-top: 1px solid var(--slate-200);
  }

  @media (max-width: 980px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .panel-grid { grid-template-columns: 1fr; }
    .risk-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const DATA = {"overview": {"total_customers": 10000, "churned": 1168, "churn_rate": 11.68, "total_aum": 2512733994.0, "avg_clv": 39565.0, "total_clv": 395650685.0, "clv_at_risk": 14588295.0, "avg_products": 4.66, "primary_bank_rate": 84.8, "avg_nps": 36.0}, "by_segment": [{"Segment": "Affluent Customers", "customers": 865, "churned": 11, "churn_rate": 1.27, "avg_products": 6.63, "avg_balance": 941790.22, "avg_clv": 183365.05, "total_clv": 158610763.96, "avg_tenure": 7.49, "avg_nps": 50.9, "avg_mobile": 55.04}, {"Segment": "Families", "customers": 2586, "churned": 69, "churn_rate": 2.67, "avg_products": 5.52, "avg_balance": 459595.03, "avg_clv": 65316.42, "total_clv": 168908266.06, "avg_tenure": 7.62, "avg_nps": 43.94, "avg_mobile": 65.09}, {"Segment": "Newcomers to Canada", "customers": 2216, "churned": 483, "churn_rate": 21.8, "avg_products": 3.41, "avg_balance": 38632.7, "avg_clv": 3320.57, "total_clv": 7358380.36, "avg_tenure": 7.65, "avg_nps": 23.78, "avg_mobile": 71.74}, {"Segment": "Students", "customers": 1181, "churned": 317, "churn_rate": 26.84, "avg_products": 3.39, "avg_balance": 2484.58, "avg_clv": 620.4, "total_clv": 732688.3, "avg_tenure": 7.63, "avg_nps": 31.17, "avg_mobile": 82.17}, {"Segment": "Young Professionals", "customers": 3152, "churned": 288, "churn_rate": 9.14, "avg_products": 4.77, "avg_balance": 133574.99, "avg_clv": 19048.41, "total_clv": 60040585.96, "avg_tenure": 7.75, "avg_nps": 35.93, "avg_mobile": 84.6}], "by_region": [{"Region": "Other GTA", "customers": 398, "churn_rate": 13.57, "avg_balance": 224502.0, "avg_clv": 35826.0}, {"Region": "Etobicoke", "customers": 794, "churn_rate": 12.85, "avg_balance": 236349.0, "avg_clv": 36539.0}, {"Region": "Markham", "customers": 759, "churn_rate": 12.78, "avg_balance": 242720.0, "avg_clv": 38123.0}, {"Region": "North York", "customers": 1180, "churn_rate": 12.63, "avg_balance": 237086.0, "avg_clv": 36577.0}, {"Region": "Mississauga", "customers": 1496, "churn_rate": 12.37, "avg_balance": 261444.0, "avg_clv": 41306.0}, {"Region": "Brampton", "customers": 1039, "churn_rate": 11.65, "avg_balance": 261961.0, "avg_clv": 42218.0}, {"Region": "Downtown Toronto", "customers": 1800, "churn_rate": 10.94, "avg_balance": 251819.0, "avg_clv": 38973.0}, {"Region": "Vaughan", "customers": 729, "churn_rate": 10.56, "avg_balance": 263353.0, "avg_clv": 43127.0}, {"Region": "Scarborough", "customers": 1140, "churn_rate": 10.44, "avg_balance": 250219.0, "avg_clv": 39219.0}, {"Region": "Richmond Hill", "customers": 665, "churn_rate": 10.08, "avg_balance": 267562.0, "avg_clv": 42596.0}], "model_risk_bands": [{"Model_Risk_Band": "Low", "customers": 3665}, {"Model_Risk_Band": "Medium", "customers": 2097}, {"Model_Risk_Band": "High", "customers": 2148}, {"Model_Risk_Band": "Critical", "customers": 2090}], "product_penetration": [{"Product": "Chequing", "customers": 9363, "avg_balance": 3871.0, "avg_revenue": 9.53, "penetration": 93.63}, {"Product": "Savings", "customers": 8059, "avg_balance": 12859.0, "avg_revenue": 25.59, "penetration": 80.59}, {"Product": "Credit Card", "customers": 6660, "avg_balance": 3815.0, "avg_revenue": 76.5, "penetration": 66.6}, {"Product": "TFSA", "customers": 5374, "avg_balance": 28886.0, "avg_revenue": 157.94, "penetration": 53.74}, {"Product": "RRSP", "customers": 4258, "avg_balance": 67053.0, "avg_revenue": 367.44, "penetration": 42.58}, {"Product": "Mortgage", "customers": 2914, "avg_balance": 509966.0, "avg_revenue": 1147.31, "penetration": 29.14}, {"Product": "Investment Account", "customers": 2799, "avg_balance": 93310.0, "avg_revenue": 511.06, "penetration": 27.99}, {"Product": "GIC", "customers": 2534, "avg_balance": 25534.0, "avg_revenue": 139.29, "penetration": 25.34}, {"Product": "Line of Credit", "customers": 2087, "avg_balance": 32414.0, "avg_revenue": 326.86, "penetration": 20.87}, {"Product": "Personal Loan", "customers": 1561, "avg_balance": 17126.0, "avg_revenue": 172.83, "penetration": 15.61}, {"Product": "Student Account", "customers": 1009, "avg_balance": 399.0, "avg_revenue": 9.48, "penetration": 10.09}], "digital_vs_churn": [{"Churn_Flag": 0, "avg_mobile": 73.4, "avg_logins": 16.6, "pct_app": 79.0}, {"Churn_Flag": 1, "avg_mobile": 77.1, "avg_logins": 17.3, "pct_app": 79.2}], "model_metrics": {"auc_roc": 0.7083, "average_precision": 0.2127, "optimal_threshold": 0.38, "top_features": [{"Feature": "Avg_Monthly_Deposits", "Importance": 0.11798802763223648}, {"Feature": "Segment", "Importance": 0.1006854772567749}, {"Feature": "Avg_Monthly_Spend", "Importance": 0.04978559911251068}, {"Feature": "Avg_eTransfers", "Importance": 0.02040679194033146}, {"Feature": "Has_Line_of_Credit", "Importance": 0.020053856074810028}, {"Feature": "Mobile_Usage_Score", "Importance": 0.01989472284913063}, {"Feature": "Has_Investment_Account", "Importance": 0.01943046972155571}, {"Feature": "Complaint_Count", "Importance": 0.019363965839147568}, {"Feature": "Has_Credit_Card", "Importance": 0.01901838555932045}, {"Feature": "Has_TFSA", "Importance": 0.018837852403521538}], "confusion_matrix": [[1411, 797], [95, 197]]}};

const NAVY = "#1B3A6B", BLUE = "#2563EB", TEAL = "#0F766E", RED = "#DC2626", AMBER = "#D97706", GREEN = "#16A34A", SLATE = "#94A3B8";

function fmtMoney(n, compact=true) {
  if (compact) {
    if (Math.abs(n) >= 1e9) return "$" + (n/1e9).toFixed(2) + "B";
    if (Math.abs(n) >= 1e6) return "$" + (n/1e6).toFixed(1) + "M";
    if (Math.abs(n) >= 1e3) return "$" + (n/1e3).toFixed(0) + "K";
  }
  return "$" + n.toLocaleString(undefined, {maximumFractionDigits:0});
}
function fmtNum(n) { return n.toLocaleString(); }

function churnColor(rate) {
  if (rate >= 18) return RED;
  if (rate >= 8) return AMBER;
  return GREEN;
}
function churnPill(rate) {
  const cls = rate >= 18 ? "red" : rate >= 8 ? "amber" : "green";
  return `<span class="pill ${cls}">${rate.toFixed(1)}%</span>`;
}

let activeTab = "overview";

function render() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="eyebrow">NorthBridge Bank &nbsp;·&nbsp; Retail Banking Strategy Engagement</div>
        <h1>Executive Analytics Dashboard</h1>
        <div class="sub">Phase 4 &nbsp;|&nbsp; GTA Retail Portfolio &nbsp;|&nbsp; 10,000 Customers &nbsp;|&nbsp; FY2025</div>
      </div>
      <div class="header-right">
        Generated from Phase 3 analytics layer<br>
        <span class="badge-conf">CONFIDENTIAL</span>
      </div>
    </div>

    <div class="tabs" id="tabs">
      ${["overview","segments","churn-model","products","regions"].map(t => `
        <div class="tab ${t===activeTab?'active':''}" data-tab="${t}">
          ${({overview:"Overview", segments:"Segments", "churn-model":"Churn Model", products:"Products", regions:"Regions"})[t]}
        </div>`).join("")}
    </div>

    <div id="tab-content"></div>

    <div class="footer">
      NorthBridge Bank Retail Banking Strategy Engagement &nbsp;·&nbsp; Synthetic portfolio data for portfolio demonstration purposes &nbsp;·&nbsp; Phase 4 Analytics
    </div>
  `;

  document.querySelectorAll(".tab").forEach(el => {
    el.addEventListener("click", () => { activeTab = el.dataset.tab; render(); });
  });

  document.getElementById("tab-content").innerHTML = renderTab(activeTab);
}

function kpiCards() {
  const o = DATA.overview;
  return `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value">${fmtNum(o.total_customers)}</div>
        <div class="kpi-sub">Full GTA portfolio</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Churn Rate</div>
        <div class="kpi-value red">${o.churn_rate}%</div>
        <div class="kpi-sub">${fmtNum(o.churned)} customers churned</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total AUM</div>
        <div class="kpi-value">${fmtMoney(o.total_aum)}</div>
        <div class="kpi-sub">Across all products</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">5-Yr CLV at Risk</div>
        <div class="kpi-value amber">${fmtMoney(o.clv_at_risk)}</div>
        <div class="kpi-sub">From churned customers</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Primary Bank Rate</div>
        <div class="kpi-value green">${o.primary_bank_rate}%</div>
        <div class="kpi-sub">Score ≥ 60 / 100</div>
      </div>
    </div>
  `;
}

function renderTab(tab) {
  if (tab === "overview") return overviewTab();
  if (tab === "segments") return segmentsTab();
  if (tab === "churn-model") return churnModelTab();
  if (tab === "products") return productsTab();
  if (tab === "regions") return regionsTab();
}

function overviewTab() {
  const seg = [...DATA.by_segment].sort((a,b) => b.churn_rate - a.churn_rate);
  const bands = DATA.model_risk_bands;
  const bandColors = {Low: GREEN, Medium: AMBER, High: "#EA580C", Critical: RED};
  const bandTotal = bands.reduce((s,b) => s+b.customers, 0);

  return `
    ${kpiCards()}
    <div class="panel-grid">
      <div class="panel">
        <h3>Churn Rate by Segment</h3>
        <div class="panel-sub">Ranked highest to lowest risk · FY2025</div>
        ${seg.map(s => `
          <div class="bar-row">
            <div class="name">${s.Segment}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(s.churn_rate*3,100)}%; background:${churnColor(s.churn_rate)}"></div></div>
            <div class="val">${s.churn_rate}%</div>
          </div>
        `).join("")}
        <div class="insight"><b>Read:</b> Students and Newcomers churn 8–20x higher than Families and Affluent customers, despite representing 34% of the base. This is the central retention problem.</div>
      </div>
      <div class="panel">
        <h3>Model Risk Distribution</h3>
        <div class="panel-sub">XGBoost predicted churn probability bands</div>
        <div class="risk-grid">
          ${bands.map(b => `
            <div class="risk-card" style="background:${bandColors[b.Model_Risk_Band]}">
              <div class="rk-name">${b.Model_Risk_Band}</div>
              <div class="rk-count">${fmtNum(b.customers)}</div>
              <div class="rk-sub">${(b.customers/bandTotal*100).toFixed(0)}% of portfolio</div>
            </div>
          `).join("")}
        </div>
        <div class="insight"><b>Action:</b> ${fmtNum(bands.find(b=>b.Model_Risk_Band==="Critical").customers)} customers fall in the Critical band — these are the highest-priority targets for proactive retention outreach.</div>
      </div>
    </div>
    <div class="panel full">
      <h3>Portfolio Health Summary</h3>
      <div class="panel-sub">Key relationship and revenue indicators</div>
      <table>
        <tr><th>Metric</th><th class="num">Value</th><th>Signal</th></tr>
        <tr><td>Average Products per Customer</td><td class="num">${DATA.overview.avg_products}</td><td>Healthy overall; concentrated in Families/Affluent</td></tr>
        <tr><td>Average 5-Year CLV</td><td class="num">${fmtMoney(DATA.overview.avg_clv)}</td><td>Wide dispersion across segments</td></tr>
        <tr><td>Total Portfolio CLV (5-yr)</td><td class="num">${fmtMoney(DATA.overview.total_clv)}</td><td>Driven by Affluent + Families (82% of total)</td></tr>
        <tr><td>Average NPS</td><td class="num">${DATA.overview.avg_nps}</td><td>Positive; Newcomers segment lags at 24</td></tr>
      </table>
    </div>
  `;
}

function segmentsTab() {
  const seg = [...DATA.by_segment].sort((a,b) => b.total_clv - a.total_clv);
  return `
    <div class="panel full">
      <h3>Segment Performance Matrix</h3>
      <div class="panel-sub">Full segment breakdown — churn, value, and relationship depth</div>
      <table>
        <tr>
          <th>Segment</th><th class="num">Customers</th><th class="num">Churn Rate</th>
          <th class="num">Avg Products</th><th class="num">Avg Balance</th>
          <th class="num">Avg 5yr CLV</th><th class="num">Total CLV</th>
          <th class="num">Avg Tenure</th><th class="num">Avg NPS</th>
        </tr>
        ${seg.map(s => `
          <tr>
            <td><b>${s.Segment}</b></td>
            <td class="num">${fmtNum(s.customers)}</td>
            <td class="num">${churnPill(s.churn_rate)}</td>
            <td class="num">${s.avg_products}</td>
            <td class="num">${fmtMoney(s.avg_balance)}</td>
            <td class="num">${fmtMoney(s.avg_clv)}</td>
            <td class="num">${fmtMoney(s.total_clv)}</td>
            <td class="num">${s.avg_tenure.toFixed(1)} yrs</td>
            <td class="num">${s.avg_nps.toFixed(0)}</td>
          </tr>
        `).join("")}
      </table>
      <div class="insight"><b>Strategic read:</b> Affluent Customers and Families together hold <b>82.7%</b> of total portfolio CLV with combined churn under 3%. Young Professionals are the highest-leverage growth segment — large base, moderate churn, and CLV that will compound as the segment ages into mortgages and wealth products.</div>
    </div>
    <div class="panel-grid">
      <div class="panel">
        <h3>CLV Contribution by Segment</h3>
        <div class="panel-sub">Share of total 5-year portfolio CLV</div>
        ${seg.map(s => {
          const pct = (s.total_clv / DATA.overview.total_clv * 100);
          return `
          <div class="bar-row">
            <div class="name">${s.Segment}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${NAVY}"></div></div>
            <div class="val">${pct.toFixed(1)}%</div>
          </div>`;
        }).join("")}
      </div>
      <div class="panel">
        <h3>Digital Engagement by Segment</h3>
        <div class="panel-sub">Average mobile usage score (0–100)</div>
        ${[...DATA.by_segment].sort((a,b)=>b.avg_mobile-a.avg_mobile).map(s => `
          <div class="bar-row">
            <div class="name">${s.Segment}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${s.avg_mobile}%; background:${TEAL}"></div></div>
            <div class="val">${s.avg_mobile.toFixed(0)}</div>
          </div>
        `).join("")}
        <div class="insight"><b>Note:</b> Affluent customers have the lowest digital engagement but lowest churn — their retention is advisor-led, not app-led.</div>
      </div>
    </div>
  `;
}

function churnModelTab() {
  const m = DATA.model_metrics;
  const cm = m.confusion_matrix; // [[TN,FP],[FN,TP]]
  const maxImp = Math.max(...m.top_features.map(f => f.Importance));
  return `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card">
        <div class="kpi-label">Model Type</div>
        <div class="kpi-value" style="font-size:18px">XGBoost</div>
        <div class="kpi-sub">300 trees, depth 4</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">AUC-ROC</div>
        <div class="kpi-value">${m.auc_roc}</div>
        <div class="kpi-sub">Discrimination power</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Precision</div>
        <div class="kpi-value">${m.average_precision}</div>
        <div class="kpi-sub">vs ${(DATA.overview.churn_rate/100).toFixed(3)} baseline</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Decision Threshold</div>
        <div class="kpi-value">${m.optimal_threshold}</div>
        <div class="kpi-sub">F1-optimized cutoff</div>
      </div>
    </div>
    <div class="panel-grid">
      <div class="panel">
        <h3>Top Churn Drivers</h3>
        <div class="panel-sub">XGBoost feature importance (gain-based)</div>
        ${m.top_features.map(f => `
          <div class="bar-row">
            <div class="name">${f.Feature.replace(/_/g," ")}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(f.Importance/maxImp*100)}%; background:${BLUE}"></div></div>
            <div class="val">${(f.Importance*100).toFixed(1)}%</div>
          </div>
        `).join("")}
        <div class="insight"><b>Read:</b> Monthly deposit behavior and segment membership are the two dominant predictors — confirming that primary-bank cash flow patterns are more predictive than any single product or demographic flag.</div>
      </div>
      <div class="panel">
        <h3>Confusion Matrix</h3>
        <div class="panel-sub">Test set (n=2,500) at optimal threshold</div>
        <table>
          <tr><th></th><th class="num">Predicted Retained</th><th class="num">Predicted Churned</th></tr>
          <tr><td><b>Actual Retained</b></td><td class="num">${cm[0][0]}</td><td class="num">${cm[0][1]}</td></tr>
          <tr><td><b>Actual Churned</b></td><td class="num">${cm[1][0]}</td><td class="num">${cm[1][1]}</td></tr>
        </table>
        <div class="insight">
          <b>Recall (catch rate):</b> ${(cm[1][1]/(cm[1][0]+cm[1][1])*100).toFixed(0)}% of actual churners are flagged by the model.<br>
          <b>Precision:</b> ${(cm[1][1]/(cm[0][1]+cm[1][1])*100).toFixed(0)}% of flagged customers actually churn.<br>
          <b>Trade-off:</b> threshold is tuned to catch more true churners at the cost of false positives — appropriate when the cost of a missed churner exceeds the cost of an unnecessary retention call.
        </div>
      </div>
    </div>
    <div class="panel full">
      <h3>Model Usage Guidance</h3>
      <div class="panel-sub">How this model should be operationalized</div>
      <table>
        <tr><th>Risk Band</th><th>Probability Range</th><th>Recommended Action</th></tr>
        <tr><td><span class="pill green">Low</span></td><td>&lt; 0.15</td><td>No action — standard relationship management</td></tr>
        <tr><td><span class="pill amber">Medium</span></td><td>0.15 – 0.35</td><td>Include in quarterly engagement campaigns</td></tr>
        <tr><td><span class="pill red" style="background:#FFEDD5;color:#EA580C">High</span></td><td>0.35 – 0.60</td><td>Outbound advisor call within 30 days</td></tr>
        <tr><td><span class="pill red">Critical</span></td><td>≥ 0.60</td><td>Immediate retention offer + advisor escalation</td></tr>
      </table>
    </div>
  `;
}

function productsTab() {
  const prod = DATA.product_penetration;
  return `
    <div class="panel full">
      <h3>Product Penetration — Full Portfolio</h3>
      <div class="panel-sub">Ranked by adoption rate across 10,000 customers</div>
      ${prod.map(p => `
        <div class="bar-row" style="grid-template-columns:170px 1fr 60px">
          <div class="name">${p.Product}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${p.penetration}%; background:${p.penetration>=50?NAVY:p.penetration>=25?BLUE:SLATE}"></div></div>
          <div class="val">${p.penetration}%</div>
        </div>
      `).join("")}
    </div>
    <div class="panel full">
      <h3>Product Detail Table</h3>
      <div class="panel-sub">Balance and revenue economics per product</div>
      <table>
        <tr><th>Product</th><th class="num">Customers</th><th class="num">Penetration</th><th class="num">Avg Balance</th><th class="num">Avg Monthly Revenue</th></tr>
        ${prod.map(p => `
          <tr>
            <td><b>${p.Product}</b></td>
            <td class="num">${fmtNum(p.customers)}</td>
            <td class="num">${p.penetration}%</td>
            <td class="num">${fmtMoney(p.avg_balance)}</td>
            <td class="num">$${p.avg_revenue.toFixed(2)}</td>
          </tr>
        `).join("")}
      </table>
      <div class="insight"><b>Cross-sell priority:</b> TFSA (54%) and RRSP (43%) sit below their potential ceiling given Chequing penetration of 94%. Closing this gap is the highest-leverage product expansion opportunity — both products carry strong revenue-per-balance and meaningfully increase switching costs.</div>
    </div>
  `;
}

function regionsTab() {
  const reg = DATA.by_region;
  return `
    <div class="panel full">
      <h3>Churn Rate by GTA Region</h3>
      <div class="panel-sub">Ranked highest to lowest risk</div>
      ${reg.map(r => `
        <div class="bar-row" style="grid-template-columns:180px 1fr 60px">
          <div class="name">${r.Region}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(r.churn_rate*5,100)}%; background:${churnColor(r.churn_rate)}"></div></div>
          <div class="val">${r.churn_rate}%</div>
        </div>
      `).join("")}
    </div>
    <div class="panel full">
      <h3>Regional Detail</h3>
      <table>
        <tr><th>Region</th><th class="num">Customers</th><th class="num">Churn Rate</th><th class="num">Avg Balance</th><th class="num">Avg 5yr CLV</th></tr>
        ${reg.map(r => `
          <tr>
            <td><b>${r.Region}</b></td>
            <td class="num">${fmtNum(r.customers)}</td>
            <td class="num">${churnPill(r.churn_rate)}</td>
            <td class="num">${fmtMoney(r.avg_balance)}</td>
            <td class="num">${fmtMoney(r.avg_clv)}</td>
          </tr>
        `).join("")}
      </table>
      <div class="insight"><b>Geographic read:</b> Other GTA, Etobicoke, and Markham show the highest churn — a mix of newcomer concentration and competitive density. Richmond Hill and Scarborough are the most stable regions, with churn near the portfolio floor.</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
